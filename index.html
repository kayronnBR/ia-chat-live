<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chat IA via Voz</title>
    <style>
        body { background: #18181B; color: #EFEFF1; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat { flex: 1; padding: 15px; overflow-y: auto; }
        #footer { background: #0E0E10; padding: 15px; border-top: 1px solid #333; }
        button { width: 100%; padding: 15px; background: #9146FF; border: none; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="footer">
        <div id="status" style="font-size: 12px; color: #aaa; margin-bottom: 5px;">Configurar primeiro...</div>
        <input type="password" id="key" placeholder="Cole sua OpenAI Key aqui" style="width: 100%; padding: 8px; margin-bottom: 5px;">
        <button id="btn" onclick="iniciar()">▶ Iniciar Escuta</button>
    </div>

<script>
    // 1. Configuração do reconhecimento de fala (Fala -> Texto)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = new SpeechRecognition();
    rec.lang = 'pt-BR';
    rec.continuous = true;

    let rodando = false;

    function iniciar() {
        const key = document.getElementById('key').value;
        if (!key) { alert("Cole a chave primeiro!"); return; }
        localStorage.setItem('KEY', key);

        if (!rodando) {
            rec.start();
            rodando = true;
            document.getElementById('btn').innerText = "■ Parar Escuta";
            document.getElementById('status').innerText = "🎙️ Ouvindo...";
        } else {
            rec.stop();
            rodando = false;
            document.getElementById('btn').innerText = "▶ Iniciar Escuta";
        }
    }

    // 2. Quando o navegador entende a fala, ele chama esta função
    rec.onresult = async (event) => {
        const texto = event.results[event.results.length - 1][0].transcript;
        adicionarLinha("Você: " + texto, "#aaa");
        
        // Envia APENAS o texto para a OpenAI
        enviarParaIA(texto);
    };

    async function enviarParaIA(texto) {
        document.getElementById('status').innerText = "IA pensando...";
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('KEY') },
            body: JSON.stringify({
                model: "gpt-3.5-turbo",
                messages: [{ role: "user", content: texto }]
            })
        });
        const data = await res.json();
        adicionarLinha("IA: " + data.choices[0].message.content, "#9146FF");
        document.getElementById('status').innerText = "🎙️ Ouvindo...";
    }

    function adicionarLinha(msg, cor) {
        const div = document.createElement('div');
        div.style.color = cor;
        div.style.marginBottom = "10px";
        div.innerText = msg;
        document.getElementById('chat').appendChild(div);
    }
</script>
</body>
</html>
