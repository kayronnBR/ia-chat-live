<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA para Streamers</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #18181B; color: #EFEFF1;
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        #chat-container {
            display: flex; flex-direction: column;
            height: 100vh; width: 350px;
            border-right: 1px solid #2f2f35;
        }

        /* --- Cabeçalho --- */
        #chat-header {
            background: #0E0E10;
            padding: 10px 12px;
            border-bottom: 1px solid #2f2f35;
            display: flex; align-items: center; gap: 8px;
        }
        #chat-header .dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #9146FF; flex-shrink: 0;
        }
        #chat-header span { font-size: 13px; font-weight: 600; color: #EFEFF1; }

        /* --- Mensagens --- */
        #chat-messages {
            flex: 1; padding: 10px 12px;
            display: flex; flex-direction: column;
            justify-content: flex-end;
            overflow-y: auto; gap: 4px;
        }

        .message { animation: fadeIn 0.3s; word-wrap: break-word; font-size: 14px; line-height: 1.4; }
        .username { font-weight: 600; margin-right: 4px; }

        /* Mensagem de sistema/IA carregando */
        .message.loading { opacity: 0.5; font-style: italic; font-size: 12px; color: #adadb8; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* --- Rodapé --- */
        #chat-footer {
            background: #0E0E10;
            padding: 10px 12px;
            border-top: 1px solid #2f2f35;
        }
        #status {
            font-size: 11px; margin-bottom: 8px;
            color: #adadb8; min-height: 16px;
        }
        #btn-start {
            width: 100%; padding: 10px;
            background: #9146FF; color: white;
            border: none; cursor: pointer;
            border-radius: 4px; font-weight: bold;
            font-size: 13px; transition: background 0.2s;
        }
        #btn-start:hover  { background: #772CE8; }
        #btn-start.parar  { background: #EB0400; }
        #btn-start.parar:hover { background: #b50300; }
        #btn-start:disabled { background: #3a3a45; cursor: not-allowed; color: #adadb8; }

        /* --- Modal --- */
        #config-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            background: #26262c; padding: 25px;
            border-radius: 8px; width: 320px; text-align: center;
        }
        .modal-content h3 { margin: 0 0 8px; font-size: 16px; }
        .modal-content p  { margin: 0 0 12px; font-size: 13px; color: #adadb8; }
        .modal-content input {
            width: 100%; padding: 10px; margin-bottom: 12px;
            border-radius: 4px; border: 1px solid #3a3a45;
            background: #18181B; color: white; font-size: 14px;
        }
        .modal-content button {
            width: 100%; padding: 10px;
            background: #9146FF; color: white;
            border: none; cursor: pointer;
            border-radius: 4px; font-weight: bold;
            font-size: 14px; transition: background 0.2s;
        }
        .modal-content button:hover { background: #772CE8; }
        a { color: #BF94FF; text-decoration: none; }

        /* Scrollbar discreta */
        #chat-messages::-webkit-scrollbar { width: 4px; }
        #chat-messages::-webkit-scrollbar-track { background: transparent; }
        #chat-messages::-webkit-scrollbar-thumb { background: #3a3a45; border-radius: 2px; }
    </style>
</head>
<body>

<!-- Modal de configuração da API -->
<div id="config-modal">
    <div class="modal-content">
        <h3>Configurar IA</h3>
        <p>Obtenha sua chave gratuita em:<br>
           <a href="https://aistudio.google.com/" target="_blank">Google AI Studio</a>
        </p>
        <input type="password" id="api-input" placeholder="Cole sua API Key aqui...">
        <button onclick="salvarAPI()">Salvar e Iniciar</button>
    </div>
</div>

<!-- Chat principal -->
<div id="chat-container">
    <div id="chat-header">
        <div class="dot"></div>
        <span>Chat IA – Streamer</span>
    </div>

    <div id="chat-messages"></div>

    <div id="chat-footer">
        <div id="status">Aguardando...</div>
        <button id="btn-start" onclick="toggleEscuta()">▶ Iniciar Escuta</button>
    </div>
</div>

<script>
// ─── Estado global ──────────────────────────────────────────────
let GEMINI_API_KEY  = localStorage.getItem('GEMINI_API_KEY');
let escutando       = false;
let processando     = false;
let reconhecendo    = false; // true enquanto o objeto recognition está ativo
let restartTimer    = null;  // timer para reinício com delay
const MAX_MSGS      = 80;

// ─── Elementos ─────────────────────────────────────────────────
const modal        = document.getElementById('config-modal');
const statusText   = document.getElementById('status');
const chatMessages = document.getElementById('chat-messages');
const btnStart     = document.getElementById('btn-start');

// Esconde modal se já tem chave salva
if (GEMINI_API_KEY) modal.style.display = 'none';

// ─── Salvar API Key ────────────────────────────────────────────
function salvarAPI() {
    const key = document.getElementById('api-input').value.trim();
    if (key) {
        localStorage.setItem('GEMINI_API_KEY', key);
        location.reload();
    }
}

// ─── Speech Recognition ───────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
    statusText.innerText = '⚠️ Navegador não suporta microfone. Use o Chrome.';
    btnStart.disabled = true;
}

const recognition = new SpeechRecognition();
recognition.continuous  = true;
recognition.lang        = 'pt-BR';
recognition.interimResults = false; // só resultados finais

recognition.onstart = () => {
    reconhecendo = true;
    console.log('[Mic] Ligado');
    statusText.innerText = '🎙️ Escutando...';
};

recognition.onend = () => {
    reconhecendo = false;
    if (!escutando) {
        statusText.innerText = 'Parado.';
        return;
    }
    // Reinicia com delay para evitar o loop de erro "network"
    console.log('[Mic] Reiniciando em 800ms...');
    clearTimeout(restartTimer);
    restartTimer = setTimeout(() => {
        if (escutando && !reconhecendo) {
            try { recognition.start(); } catch(e) { console.warn('[Mic] Não foi possível reiniciar:', e); }
        }
    }, 800);
};

recognition.onerror = (event) => {
    reconhecendo = false;
    console.warn('[Mic] Erro:', event.error);

    // Erros recuperáveis — silenciosos, o onend já vai reiniciar
    const errosRecuperaveis = ['no-speech', 'network', 'audio-capture'];
    if (errosRecuperaveis.includes(event.error)) return;

    // Erros fatais
    statusText.innerText = '⚠️ Erro no microfone: ' + event.error;
    escutando = false;
    btnStart.textContent = '▶ Iniciar Escuta';
    btnStart.classList.remove('parar');
};

recognition.onresult = async (event) => {
    const resultado = event.results[event.results.length - 1];
    if (!resultado.isFinal) return; // ignora resultados parciais

    const transcript = resultado[0].transcript.trim();
    console.log('[Mic] Captou:', transcript);

    if (transcript.length > 3 && !processando) {
        await gerarReacaoChat(transcript);
    }
};

// ─── Alternar escuta (botão) ───────────────────────────────────
function toggleEscuta() {
    if (!GEMINI_API_KEY) {
        modal.style.display = 'flex';
        return;
    }

    if (escutando) {
        // Parar
        escutando = false;
        clearTimeout(restartTimer);
        try { recognition.stop(); } catch(e) {}
        btnStart.textContent = '▶ Iniciar Escuta';
        btnStart.classList.remove('parar');
        statusText.innerText = 'Parado.';
    } else {
        // Iniciar — só chama .start() se não estiver já rodando
        escutando = true;
        btnStart.textContent = '■ Parar Escuta';
        btnStart.classList.add('parar');
        if (!reconhecendo) {
            try { recognition.start(); } catch(e) { console.warn('[Mic] Erro ao iniciar:', e); }
        }
    }
}

// ─── Gerar reação via Gemini ───────────────────────────────────
async function gerarReacaoChat(texto) {
    processando = true;
    btnStart.disabled = true;

    // Mensagem de loading temporária
    const loadingMsg = adicionarMensagem('Sistema', 'IA pensando...', '#adadb8', true);

    try {
        const prompt = `Você é um bot de chat de live na Twitch. 
        O streamer disse: "${texto}".
        Reaja com 1 ou 2 mensagens curtas de chat, no estilo de espectadores, com emoções e emojis.
        Responda APENAS com as mensagens separadas por | (pipe), sem explicações.
        Exemplo: Boa jogo! 😂 | kkkk isso foi insano 🔥`;

        const res = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { maxOutputTokens: 100, temperature: 1.0 }
                })
            }
        );

        const data = await res.json();

        // Remove loading
        loadingMsg.remove();

        if (data.error) {
            console.error('[API] Erro:', data.error.message);
            statusText.innerText = '⚠️ Erro API: ' + data.error.code;
            return;
        }

        const resposta  = data.candidates[0].content.parts[0].text.trim();
        const mensagens = resposta.split('|').map(m => m.trim()).filter(m => m.length > 0);

        // Nomes de espectadores fake para variar
        const nomes = ['Streamer_Fan99', 'xX_Gamer_Xx', 'PogChamp42', 'CoolViewer', 'kkkBR', 'TwitchBro'];

        mensagens.forEach((m, i) => {
            const nome = nomes[Math.floor(Math.random() * nomes.length)];
            const cor  = gerarCorAleatoria();
            setTimeout(() => adicionarMensagem(nome, m, cor), i * 400);
        });

    } catch (err) {
        loadingMsg.remove();
        console.error('[API] Erro fatal:', err);
        statusText.innerText = '⚠️ Erro de conexão.';
    } finally {
        processando = false;
        btnStart.disabled = false;
        if (escutando) statusText.innerText = '🎙️ Escutando...';
    }
}

// ─── Helpers ───────────────────────────────────────────────────
function adicionarMensagem(usuario, texto, cor = '#9146FF', isLoading = false) {
    const div = document.createElement('div');
    div.className = 'message' + (isLoading ? ' loading' : '');
    div.innerHTML = `<span class="username" style="color:${cor}">${escapeHtml(usuario)}:</span> ${escapeHtml(texto)}`;
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    // Limitar histórico
    while (chatMessages.children.length > MAX_MSGS) {
        chatMessages.removeChild(chatMessages.firstChild);
    }

    return div;
}

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Cores vibrantes para usuários (estilo Twitch)
function gerarCorAleatoria() {
    const cores = ['#FF7F50','#9146FF','#00B5AD','#F7971E','#56CCF2',
                   '#FF6B9D','#43E97B','#FA709A','#4FACFE','#F093FB'];
    return cores[Math.floor(Math.random() * cores.length)];
}
</script>
</body>
</html>
