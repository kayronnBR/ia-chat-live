<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chat IA - Debug</title>
    <style>
        body { background: #18181B; color: #FFF; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px; border-radius: 5px; background: #26262c; }
        .status { color: #888; font-size: 12px; padding: 10px; }
        input { padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; background: #9146FF; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat"></div>
<div class="status" id="status">Cole a chave abaixo e clique em Iniciar</div>
<div style="padding: 10px;">
    <input type="password" id="key" placeholder="OpenAI API Key (sk-...)">
    <button id="btn" onclick="toggle()">Iniciar</button>
</div>

<script>
    const chat = document.getElementById('chat');
    const status = document.getElementById('status');
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    
    recognition.lang = 'pt-BR';
    recognition.continuous = true;
    let ouvindo = false;

    function toggle() {
        if (!ouvindo) {
            recognition.start();
            ouvindo = true;
            document.getElementById('btn').innerText = "Parar";
            status.innerText = "🎙️ Ouvindo... (Fale agora!)";
        } else {
            recognition.stop();
            ouvindo = false;
            document.getElementById('btn').innerText = "Iniciar";
            status.innerText = "Parado.";
        }
    }

    recognition.onresult = async (event) => {
        const texto = event.results[event.results.length - 1][0].transcript;
        addMsg("Você disse: " + texto, "#aaa");
        
        // Se apareceu "Você disse", a escuta funcionou!
        status.innerText = "IA pensando...";
        
        try {
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + document.getElementById('key').value },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo",
                    messages: [{ role: "user", content: texto }]
                })
            });
            const data = await res.json();
            if (data.choices) {
                addMsg("IA: " + data.choices[0].message.content, "#9146FF");
            } else {
                addMsg("Erro: " + JSON.stringify(data.error), "red");
            }
        } catch (e) {
            addMsg("Erro de conexão: " + e.message, "red");
        }
        status.innerText = "🎙️ Ouvindo...";
    };

    function addMsg(txt, cor) {
        const div = document.createElement('div');
        div.className = 'msg';
        div.style.borderLeft = "4px solid " + cor;
        div.innerText = txt;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
</html>
